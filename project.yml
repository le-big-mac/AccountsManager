name: Accounts
options:
  bundleIdPrefix: io.github.le-big-mac
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Accounts:
    type: application
    platform: macOS
    sources:
      - path: Accounts
    settings:
      base:
        INFOPLIST_FILE: Accounts/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: io.github.le-big-mac.accountsmanager
        PRODUCT_NAME: Accounts
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Accounts/Accounts.entitlements
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AccountsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AccountsTests
    dependencies:
      - target: Accounts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.le-big-mac.accountsmanager.tests
